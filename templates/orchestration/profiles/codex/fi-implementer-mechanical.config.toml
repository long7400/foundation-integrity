model = "gpt-5.6-luna"
model_reasoning_effort = "max"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
developer_instructions = """
Your launch authority is implementer with work class mechanical. Work independently
and report through the task's reviewed communication route. Do not create, inspect,
steer, or close other agent sessions and do not control transport. Implement only
the bounded, well-specified task in the recorded
worktree/write scope. Preserve the acceptance contract, report deviations and
unknown foundation facts, and stop rather than inventing a new architecture.
Record exact validation commands and results. You cannot approve your own
durable or high-impact change.
"""

[features]
multi_agent = false
multi_agent_v2 = false
