# foundation-integrity :: Codex CLI hook wiring.
#
# Merge into the repo's Codex config (project-scope config.toml, or hooks.json).
# Codex lifecycle hooks use the same event model as Claude Code — events include
# PreToolUse, PostToolUse, SessionStart, Stop, PreCompact — and command hooks are
# currently supported. So the SAME scripts back this config, the git hooks, and the
# Claude settings; only the wiring format differs.
#
# Each handler MUST set `type = "command"` — Codex rejects a handler without it.
# The command runs via `sh -c` so an inline env prefix (FI_BLOCK=1 ...) is honoured;
# a bare string handler may be exec'd directly, not through a shell.
#
# Requires: features.hooks = true (features.codex_hooks is a deprecated alias).
# Adjust command paths if you vendored templates/hooks/scripts elsewhere.

[features]
hooks = true

# Warn when an Edit/Write touches a foundation-surface file with no naming ADR/receipt.
[[hooks.PostToolUse]]
[[hooks.PostToolUse.hooks]]
type = "command"
command = "sh -c 'templates/hooks/scripts/foundation-surface-guard.sh'"

# At end of turn: block on an un-recorded surface change, then run the structural check.
[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "sh -c 'FI_BLOCK=1 templates/hooks/scripts/foundation-surface-guard.sh'"
[[hooks.Stop.hooks]]
type = "command"
command = "sh -c 'templates/hooks/scripts/fitness-check.sh'"
